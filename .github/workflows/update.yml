name: IUCN Data Update

on:
  schedule:
    # Jeden 1. des Monats um 02:00 UTC
    - cron: '0 2 1 * *'
  workflow_dispatch: # Manuell auslösbar

jobs:
  update-species-data:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3

      - name: Node.js einrichten
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Abhängigkeiten installieren
        run: npm install node-fetch@3

      - name: IUCN Daten aktualisieren
        run: node update.js
        env:
          IUCN_TOKEN: ${{ secrets.IUCN_TOKEN }}

      - name: Änderungen committen & pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add speciesData.json
          git commit -m "Automatisches Update der IUCN-Daten"
          git push
