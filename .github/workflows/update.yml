name: IUCN Monthly Update

on:
  schedule:
    - cron: '0 2 1 * *'   # jeden 1. des Monats um 02:00 UTC
  workflow_dispatch:       # manuelles Starten möglich

jobs:
  update_species_data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || echo "Keine Dependencies installiert"

      - name: Update species data
        env:
          IUCN_TOKEN: ${{ secrets.IUCN_TOKEN }}
        run: node update.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add speciesData.json
          git commit -m "Automatisches Update der IUCN-Daten [ci skip]" || echo "Keine Änderungen zum Committen"
          git push
