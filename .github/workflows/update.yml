name: IUCN Monthly Update

on:
  schedule:
    - cron: '0 2 1 * *'  # am 1. des Monats um 02:00 UTC
  workflow_dispatch:

jobs:
  update_species_data:
    runs-on: ubuntu-latest

    env:
      IUCN_TOKEN: ${{ secrets.IUCN_TOKEN }}   # Token wird GLOBAL für alle Steps gesetzt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: echo "Keine Dependencies installiert" 

      - name: Check IUCN_TOKEN
        run: |
          if [ -z "$IUCN_TOKEN" ]; then
            echo "❌ IUCN_TOKEN ist leer!"
            exit 1
          else
            echo "✅ IUCN_TOKEN ist gesetzt"
          fi

      - name: Update species data
        run: node update.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add speciesData.json
          git commit -m "Automatisches Update der IUCN-Daten [ci skip]" || echo "Keine Änderungen zum Committen"
          git push
