name: Test IUCN Token

on:
  workflow_dispatch:

jobs:
  test_token:
    runs-on: ubuntu-latest
    env:
      IUCN_TOKEN: ${{ secrets.IUCN_TOKEN }}

    steps:
      - name: Prüfe IUCN_TOKEN
        run: |
          if [ -z "$IUCN_TOKEN" ]; then
            echo "❌ IUCN_TOKEN ist leer!"
            exit 1
          else
            echo "✅ IUCN_TOKEN ist gesetzt"
          fi

      - name: Test API Request
        run: |
          response=$(curl -s -H "User-Agent: Node.js Test" "https://apiv3.iucnredlist.org/api/v3/species/name/Alcedo%20atthis?token=$IUCN_TOKEN")
          echo "API Antwort:"
          echo "$response"
